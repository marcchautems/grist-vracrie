<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Grist Print Labels</title>

    <!-- A template for showing printing labels in a Custom Widget in Grist. -->
    <!-- Uses Vue.js, store.js, and the Grist Plugin API -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.5.3/vue.min.js"></script>
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oregano:ital@0;1&display=swap" rel="stylesheet">
    <script src="printlabels.js?ver=1"></script>
    <link rel="stylesheet" href="printlabels.css?ver=1">
  </head>
  <body>
    <div id="app" :style="appStyle">
      <div class="status" v-if="status">
        <template v-if="status === 'waiting'">
          <p>Waiting for data...</p>
        </template>
        <template v-else>
          {{ status }}
        </template>
      </div>
      <div class="header" v-else>
        <select id="labeltype" v-model="template" @change="save()">
          <option v-for="tmpl in templates" :value="tmpl">
          {{ tmpl.name }}
          </option>
        </select>
        <div id="options-btn" v-on:click="showOptions = true">⚙</div>
      </div>
      <div v-show="showOptions" id="options-container" v-on:click="showOptions = false">
        <div id="options-popup" v-on:click.stop>
          <div>Leave initial blanks <input type="number" id="blanks" v-model="blanks" @change="save()"></div>
          <div class="options-section">Label inner padding (mm)</div>
          <div class="options-row">
            <label>Top <input type="number" class="pad-input" v-model.number="padTop" @change="save()" min="0" step="0.5"></label>
            <label>Bottom <input type="number" class="pad-input" v-model.number="padBottom" @change="save()" min="0" step="0.5"></label>
          </div>
          <div class="options-row">
            <label>Left <input type="number" class="pad-input" v-model.number="padLeft" @change="save()" min="0" step="0.5"></label>
            <label>Right <input type="number" class="pad-input" v-model.number="padRight" @change="save()" min="0" step="0.5"></label>
          </div>
          <div class="options-section">Font settings</div>
          <table class="font-table">
            <tr><th></th><th>Size (pt)</th><th>Color</th><th>Bold</th></tr>
            <tr>
              <td>Title</td>
              <td><input type="number" class="font-size-input" v-model.number="titleSize" @change="save()" min="1" step="1"></td>
              <td><input type="color" class="font-color-input" v-model="titleColor" @change="save()"></td>
              <td><input type="checkbox" v-model="titleBold" @change="save()"></td>
            </tr>
            <tr>
              <td>Subtitle</td>
              <td><input type="number" class="font-size-input" v-model.number="subtitleSize" @change="save()" min="1" step="1"></td>
              <td><input type="color" class="font-color-input" v-model="subtitleColor" @change="save()"></td>
              <td><input type="checkbox" v-model="subtitleBold" @change="save()"></td>
            </tr>
            <tr>
              <td>Detail</td>
              <td><input type="number" class="font-size-input" v-model.number="detailSize" @change="save()" min="1" step="1"></td>
              <td><input type="color" class="font-color-input" v-model="detailColor" @change="save()"></td>
              <td><input type="checkbox" v-model="detailBold" @change="save()"></td>
            </tr>
            <tr>
              <td>Date</td>
              <td><input type="number" class="font-size-input" v-model.number="dateSize" @change="save()" min="1" step="1"></td>
              <td><input type="color" class="font-color-input" v-model="dateColor" @change="save()"></td>
              <td><input type="checkbox" v-model="dateBold" @change="save()"></td>
            </tr>
            <tr>
              <td>Top left</td>
              <td><input type="number" class="font-size-input" v-model.number="topLeftSize" @change="save()" min="1" step="1"></td>
              <td><input type="color" class="font-color-input" v-model="topLeftColor" @change="save()"></td>
              <td><input type="checkbox" v-model="topLeftBold" @change="save()"></td>
            </tr>
            <tr>
              <td>Bottom left</td>
              <td><input type="number" class="font-size-input" v-model.number="bottomLeftSize" @change="save()" min="1" step="1"></td>
              <td><input type="color" class="font-color-input" v-model="bottomLeftColor" @change="save()"></td>
              <td><input type="checkbox" v-model="bottomLeftBold" @change="save()"></td>
            </tr>
          </table>
          <div class="options-section">QR code</div>
          <div class="options-row">
            <label>Size (mm) <input type="number" class="pad-input" v-model.number="qrSize" @change="save()" min="1" step="1"></label>
          </div>
          <div class="options-section">Center block position</div>
          <div class="options-row">
            <label>Vertical (mm) <input type="number" class="pad-input" v-model.number="centerOffset" @change="save()" step="0.5"></label>
            <label>Horizontal (mm) <input type="number" class="pad-input" v-model.number="centerHOffset" @change="save()" step="0.5"></label>
          </div>
        </div>
      </div>
      <template v-if="labels">
        <div class="page-outer" :class="'outer-' + template.id" v-for="page in arrangeLabels(labels, template, blanks)">
          <div class="labelpage" :class="'page-' + template.id">
            <template v-for="label in page">
              <!-- A4 Landscape 1-per-sheet layout -->
              <template v-if="template.id === 'a4landscape1'">
                <div class="label label-a4landscape1">
                  <div class="ls-top-line"></div>
                  <div class="ls-title-area">
                    <div class="ls-title">{{label.text}}</div>
                  </div>
                  <div class="ls-mid-line"></div>
                  <div class="ls-bottom-area">
                    <div class="ls-bottom-left">
                      <div class="ls-left-text ls-detail" v-if="label.detail">{{label.detail}}</div>
                      <div class="ls-left-text ls-subtitle" v-if="label.subtitle">{{label.subtitle}}</div>
                      <div class="ls-left-text ls-bottom-left-text" v-if="label.bottomLeft">{{label.bottomLeft}}</div>
                      <div class="ls-left-text ls-date" v-if="label.date">{{label.date}}</div>
                    </div>
                    <div class="ls-bottom-center">
                      <img src="bee_vracrie.png" class="ls-center-image">
                    </div>
                    <div class="ls-bottom-right">
                      <div class="ls-code-qr">
                        <div class="ls-code" v-if="label.topLeft">{{label.topLeft}}</div>
                        <img v-if="label.qr" :src="label.qr" class="ls-qr">
                      </div>
                    </div>
                  </div>
                </div>
              </template>
              <!-- Standard label for all other templates -->
              <template v-else>
                <div class="label" :class="'label-' + template.id">
                  <div class="label-date" v-if="label.date">{{label.date}}</div>
                  <div class="label-top-left" v-if="label.topLeft">{{label.topLeft}}</div>
                  <div class="label-bottom-left" v-if="label.bottomLeft">{{label.bottomLeft}}</div>
                  <img class="label-qr" v-if="label.qr" :src="label.qr">
                  <div class="label-center">
                    <div class="label-title">{{label.text}}</div>
                    <div class="label-subtitle" v-if="label.subtitle">{{label.subtitle}}</div>
                    <div class="label-detail" v-if="label.detail">{{label.detail}}</div>
                  </div>
                </div>
              </template>
            </template>
          </div>
        </div>
      </template>
      <div class="print">
        <a href="javascript:window.print()">Print</a>
      </div>
    </div>
  </body>
</html>
